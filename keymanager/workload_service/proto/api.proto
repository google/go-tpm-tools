syntax = "proto3";

// API definitions for the Workload Services Daemon (WSD)
package keymanager.workload_service;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "km_common/proto/algorithms.proto";
import "km_common/proto/crypto_types.proto";
import "km_common/proto/payload.proto";

option go_package = "github.com/google/go-tpm-tools/keymanager/workload_service/proto;api";

service WorkloadService {
  // Returns supported cryptographic capabilities.
  rpc GetCapabilities(GetCapabilitiesRequest)
      returns (GetCapabilitiesResponse) {
    option (google.api.http) = {
      get: "/v1/capabilities"
    };
  }

  // Orchestrates the creation of a new keypair.
  rpc GenerateKey(GenerateKeyRequest) returns (GenerateKeyResponse) {
    option (google.api.http) = {
      post: "/v1/keys:generate_key"
      body: "*"
    };
  }

  // Returns a list of active keys managed by the daemon.
  rpc EnumerateKeys(EnumerateKeysRequest) returns (EnumerateKeysResponse) {
    option (google.api.http) = {
      get: "/v1/keys"
    };
  }

  // Performs a decapsulation operation.
  rpc Decaps(DecapsRequest) returns (DecapsResponse) {
    option (google.api.http) = {
      post: "/v1/keys:decap"
      body: "*"
    };
  }

  // Manually triggers the destruction of a keypair.
  rpc Destroy(DestroyRequest) returns (DestroyResponse) {
    option (google.api.http) = {
      post: "/v1/keys:destroy"
      body: "*"
    };
  }
}

// Empty request structure for GetCapabilitiesRequest
message GetCapabilitiesRequest {}

// Response containing the list of supported cryptographic algorithms for
// operations like HPKE/KEM.
message GetCapabilitiesResponse {
  // List of supported algorithms (e.g., KEM algorithms).
  repeated keymanager.SupportedAlgorithm supported_algorithms = 1;
}

// Request to orchestrate the creation of a new keypair (e.g., a KEM keypair).
// (POST /v1/keys:generate_key)
message GenerateKeyRequest {
  // The specific algorithm to use for the new keypair.
  keymanager.AlgorithmDetails algorithm = 1
      [(buf.validate.field).required = true];
  // The requested duration (in seconds) before the key is automatically
  // destroyed.
  uint64 lifespan = 2
      [(buf.validate.field).uint64 = { gt: 0, lte: 9223372036854775807 }];
}

// Response from generating a new key.
message GenerateKeyResponse {
  // A unique handle (UUID) used to reference the generated key.
  keymanager.KeyHandle key_handle = 1 [(buf.validate.field).required = true];
  // The public key information for the generated keypair.
  keymanager.PubKeyInfo pub_key = 2;
  // The isolation level/protection mechanism for the key
  // (e.g., "KEY_PROTECTION_VM_EMULATED", "KEY_PROTECTION_VM", or "DEFAULT").
  string key_protection_mechanism = 3;
  // A Unix timestamp indicating when the key is scheduled for automatic
  // deletion. Note: relies on network clock time and is subject to hypervisor
  // clock drift/skew.
  double expiration_time = 4;
}

// Empty request structure for EnumerateKeysRequest
message EnumerateKeysRequest {}

// Detailed information about an active key.
message KeyInfo {
  // A unique handle (UUID) used to reference the keypair.
  keymanager.KeyHandle key_handle = 1 [(buf.validate.field).required = true];
  // The public key information for the keypair.
  keymanager.PubKeyInfo pub_key = 2;
  // The isolation level/protection mechanism for the key.
  string key_protection_mechanism = 3;
  // A Unix timestamp indicating when the key will be automatically deleted.
  double expiration_time = 4;
}

// Response containing a list of all active keys managed by the daemon.
message EnumerateKeysResponse {
  // A list of active keys along with their metadata.
  repeated KeyInfo key_infos = 1;
}

// Request to perform a decapsulation operation using a specific key handle.
// (POST /v1/keys:decap)
message DecapsRequest {
  // The handle (UUID) of the KEM key instance to use for decapsulation.
  keymanager.KeyHandle key_handle = 1 [(buf.validate.field).required = true];
  // The encapsulated shared secret received from the client/proxy.
  keymanager.KemCiphertext ciphertext = 2
      [(buf.validate.field).required = true];
}

// Response from a decapsulation operation.
message DecapsResponse {
  // The plaintext shared secret derived from the ciphertext.
  keymanager.KemSharedSecret shared_secret = 1;
}

// Request to manually trigger the destruction of a keypair before its lifespan
// expires. (POST /v1/keys:destroy)
message DestroyRequest {
  // The handle (UUID) of the keypair to destroy.
  keymanager.KeyHandle key_handle = 1 [(buf.validate.field).required = true];
}

// Empty response structure for DestroyRequest
message DestroyResponse {}
