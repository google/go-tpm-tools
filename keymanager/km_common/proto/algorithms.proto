syntax = "proto3";

package keymanager;

option go_package = "github.com/google/go-tpm-tools/keymanager/km_common/proto;keymanager";

// Key Encapsulation Mechanism (KEM)
enum KemAlgorithm {
  KEM_ALGORITHM_UNSPECIFIED              = 0;
  KEM_ALGORITHM_DHKEM_X25519_HKDF_SHA256 = 1;
}

// Key Derivation Function (KDF)
enum KdfAlgorithm {
  KDF_ALGORITHM_UNSPECIFIED = 0;
  KDF_ALGORITHM_HKDF_SHA256 = 1;
}

// Authenticated Encryption with Associated Data (AEAD)
enum AeadAlgorithm {
  AEAD_ALGORITHM_UNSPECIFIED = 0;
  AEAD_ALGORITHM_AES_256_GCM = 1;
}

// Composite HPKE Algorithm suite
message HpkeAlgorithm {
  KemAlgorithm  kem  = 1;
  KdfAlgorithm  kdf  = 2;
  AeadAlgorithm aead = 3;
}

// Specifies parameters for a particular algorithm type.
message AlgorithmParams {
  oneof params {
    // KEM algorithm identifier (e.g., KEM_ALGORITHM_DHKEM_X25519_HKDF_SHA256).
    KemAlgorithm kem_id = 1;
  }
}

// Description of an algorithm.
message AlgorithmDetails {
  // The type of algorithm, e.g., "kem".
  string type = 1;
  // Specific parameters associated with the algorithm type.
  AlgorithmParams params = 2;
}

// Represents a cryptographic algorithm supported by the service.
message SupportedAlgorithm {
  // algorithm details.
  AlgorithmDetails algorithm = 1;
}
