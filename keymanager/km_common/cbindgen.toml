language = "C"
include_guard = "KM_COMMON_FFI_H_"
pragma_once = false
autogen_warning = "/* Auto-generated by cbindgen. DO NOT EDIT. */"
cpp_compat = true
no_includes = true
style = "type"
documentation = false
usize_is_size_t = true
sys_includes = ["stdint.h"]

[export]
item_types = ["enums", "constants"]
include = ["Status", "MAX_ALGORITHM_LEN", "MAX_PUBLIC_KEY_LEN"]

[enum]
prefix_with_name = true
