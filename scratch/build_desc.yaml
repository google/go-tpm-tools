- env:
  - BASE_IMAGE=cos-125-19216-395-47
  - BASE_IMAGE_FAMILY=cos-125-lts
  - BASE_IMAGE_PROJECT=cos-cloud
  id: BaseImageIdent
  name: gcr.io/cloud-builders/gcloud
  script: |
    #!/usr/bin/env bash

    # if BASE_IMAGE is not specified in the substitutions, use the latest image of the image family
    base_image=${BASE_IMAGE}
    if [ -z ${base_image} ]
    then
      echo "getting the latest image from project:" ${BASE_IMAGE_PROJECT} "family: "${BASE_IMAGE_FAMILY}
      base_image=$(gcloud compute images describe-from-family ${BASE_IMAGE_FAMILY} --project ${BASE_IMAGE_PROJECT} | grep name | cut -d ' ' -f 2)
    fi

    echo "base image:" ${base_image} "project:" ${BASE_IMAGE_PROJECT}
    echo ${base_image} > /workspace/base_image.txt
- args:
  - -c
  - |
    set -exuo pipefail
    # Install build dependencies for Rust
    apt-get update && apt-get install -y clang build-essential curl tar

    # Install CMake 3.28.3 from pre-compiled binaries for flexibility across environments
    curl -sSL https://github.com/Kitware/CMake/releases/download/v3.28.3/cmake-3.28.3-linux-x86_64.tar.gz -o cmake.tar.gz
    tar -zxvf cmake.tar.gz -C /opt/
    export PATH="/opt/cmake-3.28.3-linux-x86_64/bin:$PATH"
    rm cmake.tar.gz

    # Install bindgen-cli (needed by BoringSSL's CMake build)
    cargo install bindgen-cli
    export PATH="$HOME/.cargo/bin:$PATH"

    # Build the Rust keymanager libraries
    cd keymanager
    cargo build --release
  entrypoint: /bin/bash
  id: KeyManagerCompile
  name: rust:1.85-bullseye
- args:
  - -c
  - |
    set -exuo pipefail
    # Install Go build tools (clang is needed for CGO)
    apt-get update && apt-get install -y clang pkg-config libssl-dev build-essential

    # Build the launcher with CGO enabled
    cd launcher/launcher
    export CGO_LDFLAGS="-L/workspace/keymanager/target/release"
    export GOTOOLCHAIN=auto
    go build -o ../image/launcher -ldflags="-extldflags=-Wl,-z,lazy -X 'main.BuildCommit='"
  entrypoint: /bin/bash
  id: LauncherCompile
  name: golang:1.24-bullseye
  waitFor:
  - KeyManagerCompile
- args:
  - -c
  - |
    set -ex
    BASE_IMAGE=$(cat /workspace/base_image.txt)
    VERSION=$(echo "${BASE_IMAGE}" | grep -oE '[0-9]+-[0-9]+-[0-9]+$' | tr '-' '.')
    if [[ -z "${VERSION}" ]]; then
      echo "Failed to extract version from ${BASE_IMAGE}"
      exit 1
    fi

    gcloud storage cp \
      gs://cos-nvidia-gpu-drivers/NVIDIA-Linux-x86_64-595.58.03.run \
      "gs://cos-tools/${VERSION}/lakitu/gpu_driver_versions.bin" \
      "gs://cos-tools/${VERSION}/lakitu/nvidia-drivers-595.58.03.tgz" \
      ./launcher/image/
  entrypoint: bash
  id: DownloadGpuDrivers
  name: gcr.io/cloud-builders/gcloud
  waitFor:
  - BaseImageIdent
